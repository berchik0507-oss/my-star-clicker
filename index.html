<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: radial-gradient(circle, #1e272e, #000000); 
            color: white; 
            text-align: center; 
            font-family: sans-serif; 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            user-select: none;
        }
        #status { font-size: 18px; color: #00d8ff; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        #balance { font-size: 50px; font-weight: 900; color: #f1c40f; text-shadow: 0 0 20px rgba(241, 196, 15, 0.6); margin-bottom: 10px; }
        #progress-container { width: 80%; background: #333; height: 10px; border-radius: 5px; margin-bottom: 30px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #f1c40f, #f39c12); transition: width 0.3s; }
        .coin-container { position: relative; display: inline-block; }
        #coin { width: 240px; height: 240px; cursor: pointer; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        #coin:active { transform: scale(0.92); }
        .plus-one {
            position: absolute; color: #f1c40f; font-size: 26px; font-weight: bold;
            pointer-events: none; animation: floatUp 0.7s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }
        button { 
            margin-top: 40px; background: linear-gradient(135deg, #27ae60, #2ecc71); 
            color: white; border: none; padding: 15px 40px; border-radius: 12px; 
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="status">Статус: Бедняк 👕</div>
    <div id="balance">💰 0</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div class="coin-container" id="container">
        <img id="coin" src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
    </div>
    <button onclick="saveAndExit()">Сохранить и выйти</button>

    <script>
        let score = 0;
        let tg = window.Telegram.WebApp;
        tg.expand();
        const coinImg = document.getElementById('coin');
        const balanceTxt = document.getElementById('balance');
        const statusTxt = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        const container = document.getElementById('container');
        const levels = [
            { min: 0, max: 100, name: "Бедняк 👕", img: "https://cdn-icons-png.flaticon.com/512/2489/2489756.png" },
            { min: 100, max: 500, name: "Работяга 🛠️", img: "https://cdn-icons-png.flaticon.com/512/3135/3135688.png" },
            { min: 500, max: 1500, name: "Бизнесмен 💼", img: "https://cdn-icons-png.flaticon.com/512/2685/2685043.png" },
            { min: 1500, max: 5000, name: "Миллионер 💎", img: "https://cdn-icons-png.flaticon.com/512/2169/2169864.png" },
            { min: 5000, max: 10000, name: "Олигарх 🏛️", img: "https://cdn-icons-png.flaticon.com/512/2438/2438094.png" }
        ];
        function updateUI() {
            balanceTxt.innerText = "💰 " + score;
            for (let i = levels.length - 1; i >= 0; i--) {
                if (score >= levels[i].min) {
                    if (!coinImg.src.includes(levels[i].img)) {
                        coinImg.src = levels[i].img;
                        statusTxt.innerText = "Статус: " + levels[i].name;
                    }
                    let percent = ((score - levels[i].min) / (levels[i].max - levels[i].min)) * 100;
                    progressBar.style.width = Math.min(percent, 100) + "%";
                    break;
                }
            }
        }
        coinImg.addEventListener('click', (e) => {
            score++;
            updateUI();
            const plus = document.createElement('div');
            plus.classList.add('plus-one');
            plus.innerText = '+1';
            const rect = container.getBoundingClientRect();
            plus.style.left = (e.clientX - rect.left - 20) + 'px';
            plus.style.top = (e.clientY - rect.top - 20) + 'px';
            container.appendChild(plus);
            setTimeout(() => plus.remove(), 700);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });
        function saveAndExit() {
            tg.sendData(score.toString());
            tg.close();
        }
    </script>
</body>
</html>
