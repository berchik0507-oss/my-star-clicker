<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: radial-gradient(circle, #1e272e, #000000); 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }
        #status { font-size: 20px; color: #00d8ff; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        #balance { font-size: 50px; font-weight: 900; color: #f1c40f; text-shadow: 0 0 20px rgba(241, 196, 15, 0.6); margin-bottom: 30px; }
        #coin { width: 240px; height: 240px; cursor: pointer; transition: transform 0.05s; user-select: none; -webkit-tap-highlight-color: transparent; filter: drop-shadow(0 0 15px rgba(0,0,0,0.5)); }
        #coin:active { transform: scale(0.92); }
        button { 
            margin-top: 50px; 
            background: linear-gradient(135deg, #27ae60, #2ecc71); 
            color: white; 
            border: none; 
            padding: 18px 35px; 
            border-radius: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); 
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="status">Статус: Бедняк 👕</div>
    <div id="balance">💰 0</div>
    <img id="coin" src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
    <button onclick="saveAndExit()">Сохранить и выйти</button>

    <script>
        let score = 0;
        let tg = window.Telegram.WebApp;
        tg.expand();

        const coinImg = document.getElementById('coin');
        const balanceTxt = document.getElementById('balance');
        const statusTxt = document.getElementById('status');

        // НОВЫЕ УРОВНИ И КАРТИНКИ (БОГАТЫЙ СТИЛЬ)
        const levels = [
            { min: 0, name: "Бедняк 👕", img: "https://cdn-icons-png.flaticon.com/512/2489/2489756.png" },
            { min: 100, name: "Работяга 🛠️", img: "https://cdn-icons-png.flaticon.com/512/3135/3135688.png" },
            { min: 500, name: "Бизнесмен 💼", img: "https://cdn-icons-png.flaticon.com/512/2685/2685043.png" },
            { min: 1500, name: "Миллионер 💎", img: "https://cdn-icons-png.flaticon.com/512/2169/2169864.png" },
            { min: 5000, name: "Олигарх 🏛️", img: "https://cdn-icons-png.flaticon.com/512/2438/2438094.png" },
            { min: 10000, name: "Крипто Король 👑", img: "https://cdn-icons-png.flaticon.com/512/10427/10427845.png" }
        ];

        function updateLevel() {
            for (let i = levels.length - 1; i >= 0; i--) {
                if (score >= levels[i].min) {
                    if (!coinImg.src.includes(levels[i].img)) {
                        coinImg.src = levels[i].img;
                        statusTxt.innerText = "Статус: " + levels[i].name;
                    }
                    break;
                }
            }
        }

        coinImg.addEventListener('click', () => {
            score++;
            balanceTxt.innerText = "💰 " + score;
            updateLevel();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        function saveAndExit() {
            tg.sendData(score.toString());
            tg.close();
        }
    </script>
</body>
</html>
