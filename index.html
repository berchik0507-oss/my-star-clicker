<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        #coin { width: 200px; filter: drop-shadow(0 0 10px gold); cursor: pointer; }
        #balance { font-size: 40px; margin: 20px; color: gold; }
        button { background: #2ecc71; color: white; border: none; padding: 15px 25px; border-radius: 10px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="balance">💰 0</div>
    <img id="coin" src="https://cdn-icons-png.flaticon.com/512/5935/5935833.png" onclick="tap()">
    <br>
    <button onclick="saveAndExit()">Сохранить и выйти</button>

    <script>
        let score = 0;
        let tg = window.Telegram.WebApp;
        tg.expand();

        function tap() {
            score++;
            document.getElementById('balance').innerText = "💰 " + score;
        }

        function saveAndExit() {
            tg.sendData(score.toString());
            tg.close();
        }
    </script>
</body>
</html>
