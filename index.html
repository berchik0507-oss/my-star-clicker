<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: radial-gradient(circle, #1e272e, #000000); color: white; text-align: center; font-family: sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; user-select: none; }
        #status { font-size: 18px; color: #00d8ff; margin-bottom: 5px; font-weight: bold; }
        #balance { font-size: 50px; font-weight: 900; color: #f1c40f; margin-bottom: 10px; }
        #progress-container { width: 80%; background: #333; height: 10px; border-radius: 5px; margin-bottom: 30px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #f1c40f, #f39c12); transition: width 0.3s; }
        #coin { width: 240px; height: 240px; cursor: pointer; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        #coin:active { transform: scale(0.92); }
        button { background: #27ae60; color: white; border: none; padding: 15px 25px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .plus-one { position: absolute; color: #f1c40f; font-size: 26px; font-weight: bold; pointer-events: none; animation: floatUp 0.7s ease-out forwards; }
        .critical { color: #ff4757; text-shadow: 0 0 10px #ff4757; font-size: 32px; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>
    <div id="status">Загрузка...</div>
    <div id="balance">💰 0</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <img id="coin" src="">
    <br>
    <button onclick="saveAndExit()">Сохранить и Выйти</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        let score = parseInt(urlParams.get('score')) || 0;

        const levels = [
            { min: 0, max: 100, name: "Бедыч 👕", img: "https://cdn-icons-png.flaticon.com/512/2489/2489756.png" },
            { min: 100, max: 500, name: "Работяга 🛠️", img: "https://cdn-icons-png.flaticon.com/512/3135/3135688.png" },
            { min: 500, max: 1500, name: "Бизнесмен 💼", img: "https://cdn-icons-png.flaticon.com/512/2685/2685043.png" },
            { min: 1500, max: 5000, name: "Миллионер 💎", img: "https://cdn-icons-png.flaticon.com/512/2169/2169864.png" },
            { min: 5000, max: 10000000, name: "Олигарх 🏛️", img: "https://cdn-icons-png.flaticon.com/512/2438/2438094.png" }
        ];

        function updateUI() {
            document.getElementById('balance').innerText = "💰 " + score;
            let currentLevel = levels[0];
            for (let i = levels.length - 1; i >= 0; i--) {
                if (score >= levels[i].min) {
                    currentLevel = levels[i];
                    break;
                }
            }
            document.getElementById('coin').src = currentLevel.img;
            document.getElementById('status').innerText = "Статус: " + currentLevel.name;
            let range = currentLevel.max - currentLevel.min;
            let percent = ((score - currentLevel.min) / range) * 100;
            document.getElementById('progress-bar').style.width = Math.min(percent, 100) + "%";
        }

        updateUI();

        document.getElementById('coin').addEventListener('click', (e) => {
            let isCrit = Math.random() < 0.05; // 5% шанс на 20 монет
            let amount = isCrit ? 20 : 1;
            score += amount;
            
            updateUI();

            const plus = document.createElement('div');
            plus.className = 'plus-one' + (isCrit ? ' critical' : '');
            plus.innerText = isCrit ? 'LUCKY +20!' : '+1';
            plus.style.left = e.pageX + 'px';
            plus.style.top = e.pageY + 'px';
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 700);
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(isCrit ? 'heavy' : 'light');
        });

        function saveAndExit() {
            let currentRank = document.getElementById('status').innerText.replace("Статус: ", "");
            tg.sendData(score + "|" + currentRank);
            tg.close();
        }
    </script>
</body>
</html>
