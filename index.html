<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    
    const urlParams = new URLSearchParams(window.location.search);
   
    let score = parseInt(urlParams.get('score')) || 0;
    let totalClicks = 0; 
    let isTurbo = false;

   
    const levels = [
        { min: 0, max: 100, name: "Бедняк 👕", img: "https://cdn-icons-png.flaticon.com/512/2489/2489756.png" },
        { min: 100, max: 500, name: "Работяга 🛠️", img: "https://cdn-icons-png.flaticon.com/512/3135/3135688.png" },
        { min: 500, max: 1500, name: "Бизнесмен 💼", img: "https://cdn-icons-png.flaticon.com/512/2685/2685043.png" },
        { min: 1500, max: 5000, name: "Миллионер 💎", img: "https://cdn-icons-png.flaticon.com/512/2169/2169864.png" },
        { min: 5000, max: 10000000, name: "Олигарх 🏛️", img: "https://cdn-icons-png.flaticon.com/512/2438/2438094.png" }
    ];

   
    function updateUI() {
        document.getElementById('balance').innerText = "💰 " + score;
        for (let i = levels.length - 1; i >= 0; i--) {
            if (score >= levels[i].min) {
                document.getElementById('coin').src = levels[i].img;
                document.getElementById('status').innerText = "Статус: " + levels[i].name;
                let percent = ((score - levels[i].min) / (levels[i].max - levels[i].min)) * 100;
                document.getElementById('progress-bar').style.width = Math.min(percent, 100) + "%";
                break;
            }
        }
    }

  
    updateUI();

    
    document.getElementById('coin').addEventListener('click', (e) => {
        totalClicks++;
        let mult = isTurbo ? 5 : 1;
        let isCrit = Math.random() < 0.05;
        let amount = (isCrit ? 20 : 1) * mult;
        score += amount;
        
        updateUI(); 

        
        const plus = document.createElement('div');
        plus.className = 'plus-one' + (isCrit ? ' critical' : '');
        plus.innerText = isCrit ? `LUCKY +${amount}!` : `+${amount}`;
        plus.style.left = (e.clientX - 50) + 'px';
        plus.style.top = (e.clientY - 20) + 'px';
        document.body.appendChild(plus);
        setTimeout(() => plus.remove(), 800);
        
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    });

    
    function saveAndExit() {
       
        let currentRank = document.getElementById('status').innerText.replace("Статус: ", "");
        
        
        let dataToSend = score + "|" + currentRank;
        
        tg.sendData(dataToSend); // 
        tg.close(); // 
    }

    function toggleProfile() { document.getElementById('profile-card').classList.toggle('active'); }
    function toggleInfo() { document.getElementById('info-card').classList.toggle('active'); }
</script>
