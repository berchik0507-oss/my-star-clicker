<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        #balance { font-size: 50px; color: #f1c40f; margin-bottom: 20px; }
        #coin { width: 200px; cursor: pointer; user-select: none; }
        #coin:active { transform: scale(0.9); }
        button { margin-top: 30px; background: #2ecc71; border: none; color: white; padding: 15px 25px; border-radius: 12px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="balance">💰 0</div>
    <img id="coin" src="https://cdn-icons-png.flaticon.com/512/5935/5935833.png" onclick="tap()">
    <button onclick="sendData()">Сохранить и выйти</button>

    <script>
        let score = 0;
        let tg = window.Telegram.WebApp;
        tg.expand();

        function tap() {
            score++;
            document.getElementById('balance').innerText = "💰 " + score;
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function sendData() {
            tg.sendData(score.toString()); 
            tg.close();
        }
    </script>
</body>
</html>
